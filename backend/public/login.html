<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login — Control Biométrico</title>
<link rel="icon" href="data:,">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
:root {
  --bg: #080c14;
  --surface: #0f1520;
  --surface2: #151d2e;
  --surface3: #1c2740;
  --border: rgba(0,200,180,0.12);
  --accent: #00c8b4;
  --accent-dim: rgba(0,200,180,0.12);
  --text: #e8edf5;
  --muted: #5a6a82;
  --danger: #ef4444;
  --success: #10b981;
  --font-mono: 'Space Mono', monospace;
  --font-body: 'DM Sans', sans-serif;
  --radius: 14px;
  --shadow: 0 8px 40px rgba(0,0,0,0.5);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg); color: var(--text); font-family: var(--font-body);
  min-height: 100vh; display: flex; flex-direction: column; overflow-x: hidden;
}
body::before {
  content: ''; position: fixed; inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
  pointer-events: none; z-index: 0;
}
.navbar {
  background: var(--surface); border-bottom: 1px solid var(--border);
  padding: 0 28px; height: 64px; display: flex; align-items: center;
  justify-content: space-between; position: sticky; top: 0; z-index: 100;
  backdrop-filter: blur(12px);
}
.brand {
  font-family: var(--font-mono); color: var(--accent); font-size: 0.95rem;
  letter-spacing: 2px; display: flex; align-items: center; gap: 10px; text-decoration: none;
}
.brand-dot {
  width: 8px; height: 8px; background: var(--accent); border-radius: 50%;
  box-shadow: 0 0 10px var(--accent); animation: pulse 2s ease-in-out infinite;
}
@keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.4;transform:scale(0.7)} }
.nav-links { list-style: none; display: flex; gap: 4px; align-items: center; }
.nav-links a {
  color: var(--muted); text-decoration: none; font-size: 0.83rem; font-weight: 500;
  padding: 6px 14px; border-radius: 8px; transition: all 0.2s;
}
.nav-links a:hover { color: var(--text); background: var(--surface2); }
.nav-links .danger a { color: var(--danger); }
.nav-links .danger a:hover { background: rgba(239,68,68,0.1); }
.hamburger { display: none; flex-direction: column; gap: 5px; cursor: pointer; padding: 4px; }
.hamburger div { width: 22px; height: 2px; background: var(--muted); border-radius: 2px; }
@media (max-width: 680px) {
  .hamburger { display: flex; }
  .nav-links {
    display: none; flex-direction: column; gap: 0;
    position: absolute; top: 64px; right: 16px;
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 8px; min-width: 180px; box-shadow: var(--shadow);
  }
  .nav-links.show { display: flex; }
  .nav-links a { padding: 10px 14px; }
}
main {
  flex: 1; display: flex; align-items: flex-start; justify-content: center;
  padding: 48px 20px; position: relative; z-index: 1;
}
main::before {
  content: ''; position: fixed; top: 30%; left: 50%; transform: translate(-50%, -50%);
  width: 500px; height: 500px;
  background: radial-gradient(circle, rgba(0,200,180,0.04) 0%, transparent 70%);
  pointer-events: none;
}
.card {
  background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
  width: 100%; max-width: 400px; box-shadow: var(--shadow); overflow: hidden;
  animation: fadeUp 0.5s ease both;
}
@keyframes fadeUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
.card-header { padding: 24px 28px 20px; border-bottom: 1px solid var(--border); }
.card-eyebrow {
  font-family: var(--font-mono); font-size: 0.68rem; letter-spacing: 3px;
  color: var(--accent); text-transform: uppercase; margin-bottom: 6px;
}
.card-title { font-family: var(--font-mono); font-size: 1.25rem; font-weight: 700; color: var(--text); }
.card-body { padding: 28px; }
.field { margin-bottom: 18px; }
.field label {
  display: block; font-family: var(--font-mono); font-size: 0.68rem;
  letter-spacing: 2px; color: var(--muted); text-transform: uppercase; margin-bottom: 7px;
}
.field input {
  width: 100%; background: var(--surface2); border: 1px solid var(--border); color: var(--text);
  border-radius: 9px; padding: 11px 15px; font-size: 0.9rem; font-family: var(--font-body);
  outline: none; transition: border-color 0.2s, background 0.2s;
}
.field input:focus { border-color: var(--accent); background: var(--surface3); }
.field input::placeholder { color: var(--muted); }
.input-wrap { position: relative; }
.input-wrap input { padding-right: 44px; }
.toggle-pw {
  position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
  background: none; border: none; color: var(--muted); cursor: pointer;
  font-size: 1rem; padding: 0; line-height: 1; transition: color 0.2s; width: auto;
}
.toggle-pw:hover { color: var(--accent); }
.btn-primary {
  width: 100%; background: var(--accent-dim); border: 1px solid var(--accent);
  color: var(--accent); padding: 12px; border-radius: 9px; font-family: var(--font-mono);
  font-size: 0.85rem; letter-spacing: 1px; cursor: pointer; transition: all 0.2s; margin-top: 6px;
}
.btn-primary:hover:not(:disabled) { background: var(--accent); color: #000; }
.btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }
.status-bar {
  display: none; align-items: center; gap: 10px; padding: 11px 15px; border-radius: 9px;
  background: var(--surface2); border: 1px solid var(--border); font-size: 0.82rem;
  color: var(--muted); margin-top: 14px;
}
.status-bar.visible { display: flex; }
.status-bar.success { border-color: rgba(16,185,129,0.4); color: #34d399; background: rgba(16,185,129,0.07); }
.status-bar.error   { border-color: rgba(239,68,68,0.4);  color: #f87171; background: rgba(239,68,68,0.07); }
.status-bar.loading { border-color: rgba(0,200,180,0.4);  color: var(--accent); background: var(--accent-dim); }
.status-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; background: currentColor; }
.status-bar.loading .status-dot { animation: pulse 1s infinite; }
footer {
  background: var(--surface); border-top: 1px solid var(--border); padding: 18px;
  text-align: center; font-family: var(--font-mono); font-size: 0.72rem;
  color: var(--muted); position: relative; z-index: 1;
}
.footer-brand { color: var(--accent); letter-spacing: 3px; text-shadow: 0 0 10px rgba(0,200,180,0.5); }
</style>
</head>
<body>

<nav class="navbar">
  <a class="brand" href="login.html">
    <div class="brand-dot"></div>
    CONTROL BIOMÉTRICO
  </a>
  <div class="hamburger" id="hamburger"><div></div><div></div><div></div></div>
  <ul class="nav-links" id="navLinks">
    <li><a href="index.html">Inicio</a></li>
    
    <li id="linkPanel"  style="display:none"><a href="admin.html">Panel Admin</a></li>
    <li id="linkRegistro" style="display:none"><a href="registro.html">Registrar</a></li>
    <li id="linkLogout" class="danger" style="display:none"><a href="#" id="logoutBtn">Cerrar sesión</a></li>
  </ul>
</nav>

<main>
  <div class="card">
    <div class="card-header">
      <div class="card-eyebrow">Autenticación</div>
      <div class="card-title">Acceso al sistema</div>
    </div>
    <div class="card-body">
      <div class="field">
        <label>Usuario</label>
        <input type="text" id="username" placeholder="Nombre de usuario" autocomplete="off" />
      </div>
      <div class="field">
        <label>Contraseña</label>
        <div class="input-wrap">
          <input type="password" id="password" placeholder="Contraseña" />
          <button class="toggle-pw" id="togglePw" type="button">👁</button>
        </div>
      </div>
      <button class="btn-primary" id="btnLogin" type="button">Iniciar Sesión</button>
      <div class="status-bar" id="statusBar">
        <div class="status-dot"></div>
        <span id="statusTexto"></span>
        
      </div>
    </div>
  </div>
</main>

<footer>
  Powered by <span class="footer-brand">HOPD</span> &nbsp;·&nbsp; © <span id="year"></span> Control Biométrico
</footer>

<script>
document.getElementById("year").textContent = new Date().getFullYear();

// ✅ FIX: helper de estado
function setStatus(msg, type) {
  const bar = document.getElementById("statusBar");
  bar.className = `status-bar visible ${type}`;
  document.getElementById("statusTexto").textContent = msg;
}

// Solo actualizamos la navbar si hay sesión activa
const token = localStorage.getItem("token");

if (token) {
  try {
    const payload = JSON.parse(atob(token.split('.')[1]));
    const role = payload.role;

    document.getElementById("linkLogin").style.display   = "none";
    document.getElementById("linkLogout").style.display  = "block";
    document.getElementById("linkIndex").style.display   = "block";

    if (role === "admin") {
      document.getElementById("linkPanel").style.display    = "block";
      document.getElementById("linkRegistro").style.display = "block";
    } else if (role === "user") {
      document.getElementById("linkRegistro").style.display = "block";
    }
  } catch {
    // token corrupto → limpiar
    localStorage.removeItem("token");
  }
}


document.getElementById("hamburger").addEventListener("click", () =>
  document.getElementById("navLinks").classList.toggle("show")
);

// Logout
document.getElementById("logoutBtn").addEventListener("click", e => {
  e.preventDefault();
  localStorage.removeItem("token");
  window.location.href = "login.html";
});

// Toggle password
document.getElementById("togglePw").addEventListener("click", () => {
  const input = document.getElementById("password");
  input.type = input.type === "password" ? "text" : "password";
});

// Enter para login
document.getElementById("password").addEventListener("keydown", e => {
  if (e.key === "Enter") document.getElementById("btnLogin").click();
});
document.getElementById("username").addEventListener("keydown", e => {
  if (e.key === "Enter") document.getElementById("btnLogin").click();
});

// ✅ LOGIN — sin DOMContentLoaded anidado
document.getElementById("btnLogin").addEventListener("click", async () => {
  const username = document.getElementById("username").value.trim();
  const password = document.getElementById("password").value.trim();

  if (!username || !password) {
    setStatus("Completa todos los campos.", "error");
    return;
  }

  const btn = document.getElementById("btnLogin");
  btn.disabled = true;
  setStatus("Verificando credenciales…", "loading");

  try {
    const res = await fetch("/login", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ username, password })
    });

    let data;
    try { data = await res.json(); }
    catch {
      setStatus("Error en la comunicación con el servidor.", "error");
      btn.disabled = false;
      return;
    }

    if (res.ok) {
      localStorage.setItem("token", data.token);
      setStatus("Acceso concedido. Redirigiendo…", "success");
      // ✅ Redirigir según rol
      setTimeout(() => {
        window.location.href = "index.html";
      }, 800);
    } else {
      setStatus(data.msg || "Usuario o contraseña incorrectos.", "error");
      btn.disabled = false;
    }

  } catch {
    setStatus("No se pudo conectar con el servidor.", "error");
    btn.disabled = false;
  }
});
</script>
</body>
</html>
