<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Registrar Persona - Control Biométrico</title>
<style>
body { background:#0b0f17; color:white; font-family:Arial; text-align:center; margin:0; padding:0; }
h1 { color:#00ffcc; margin-top:20px; }
#panel { background:#111827; width:500px; margin:auto; padding:20px; border-radius:12px; box-shadow:0 10px 25px rgba(0,255,204,0.2); margin-top:20px; }
input, select, button { width:80%; padding:10px; margin:10px 0; border-radius:6px; border:none; font-size:16px; }
button { background:#00ffcc; cursor:pointer; font-weight:bold; transition:0.3s; }
button:hover { background:#00d4aa; }
#videoContainer { position:relative; display:inline-block; margin-top:20px; }
video { border-radius:10px; border:2px solid #00ffcc; }
canvas { position:absolute; top:0; left:0; border-radius:10px; pointer-events:none; }
#mensaje { margin-top:15px; font-weight:bold; }

/* Navbar y Footer omitidos para simplicidad, puedes añadir los tuyos */
</style>
</head>
<body>

<h1>Registrar Persona</h1>

<div id="panel">
  <input type="text" id="nombre" placeholder="Nombre completo">
  <select id="sede">
    <option value="">Seleccionar sede...</option>
    <option value="SOATA">SOATA</option>
    <option value="PAIPA">PAIPA</option>
  </select>
  <button id="btnRegistrar">Registrar Persona</button>
  <div id="mensaje">Cargando...</div>

  <div id="videoContainer">
    <video id="video" width="400" height="300" autoplay muted playsinline></video>
    <canvas id="canvas" width="400" height="300"></canvas>
  </div>
</div>

<script src="/js/face-api.min.js"></script>
<script>
const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
const btnRegistrar = document.getElementById("btnRegistrar");
const mensaje = document.getElementById("mensaje");

// ---------------- Cargar modelos ----------------
async function cargarModelos() {
  mensaje.innerText = "Cargando modelos...";
  await faceapi.nets.tinyFaceDetector.loadFromUri("/models");
  await faceapi.nets.faceLandmark68Net.loadFromUri("/models");
  await faceapi.nets.faceRecognitionNet.loadFromUri("/models");
  mensaje.innerText = "Modelos cargados ✅";
}

// ---------------- Activar cámara ----------------
async function activarCamara() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
    video.srcObject = stream;
    await video.play();
    mensaje.innerText = "Cámara activa ✅";
  } catch (err) {
    console.error("Error al abrir cámara:", err);
    mensaje.innerText = "No se pudo acceder a la cámara.";
    mensaje.style.color = "red";
  }
}

// ---------------- Capturar descriptor ----------------
async function capturarDescriptor() {
  const descriptors = [];
  for (let i = 0; i < 3; i++) {
    const deteccion = await faceapi.detectSingleFace(video, new faceapi.TinyFaceDetectorOptions({ inputSize: 320, scoreThreshold: 0.5 }))
      .withFaceLandmarks()
      .withFaceDescriptor();
    if (!deteccion) {
      mensaje.innerText = "No se detecta rostro, intenta de nuevo";
      mensaje.style.color = "red";
      return null;
    }
    descriptors.push(Array.from(deteccion.descriptor));
    await new Promise(r => setTimeout(r, 500));
  }
  // Promedio de descriptores
  return descriptors[0].map((_, i) => descriptors.reduce((sum, d) => sum + d[i], 0) / descriptors.length);
}

// ---------------- Dibujo en canvas ----------------
function dibujarRostro(nombre="Detectando...") {
  setInterval(async () => {
    const deteccion = await faceapi.detectSingleFace(video, new faceapi.TinyFaceDetectorOptions({ inputSize: 320, scoreThreshold: 0.5 }))
      .withFaceLandmarks()
      .withFaceDescriptor();
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    if (deteccion) {
      const box = deteccion.detection.box;

      // Dibujar rectángulo
      ctx.strokeStyle = "#00ffcc";
      ctx.lineWidth = 2;
      ctx.shadowColor = "#00ffcc";
      ctx.shadowBlur = 10;
      ctx.strokeRect(box.x, box.y, box.width, box.height);

      // Nombre
      ctx.font = "16px Arial";
      ctx.fillStyle = "#00ffcc";
      ctx.textAlign = "center";
      ctx.fillText(nombre, box.x + box.width / 2, box.y - 10);
    }
  }, 200);
}

// ---------------- Inicializar ----------------
window.addEventListener("load", async () => {
  await cargarModelos();
  await activarCamara();
  dibujarRostro(); // Dibuja "Detectando..." inicialmente
});

// ---------------- Registrar persona ----------------
btnRegistrar.addEventListener("click", async () => {
  const nombre = document.getElementById("nombre").value.trim();
  const sede = document.getElementById("sede").value;
  const token = localStorage.getItem("token");

  if (!nombre || !sede) {
    mensaje.innerText = "Completa todos los campos";
    mensaje.style.color = "red";
    return;
  }

  mensaje.innerText = "Capturando rostro...";
  mensaje.style.color = "white";

  const descriptorPromedio = await capturarDescriptor();
  if (!descriptorPromedio) return;

  const response = await fetch("/registrar-persona", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "Authorization": "Bearer " + token
    },
    body: JSON.stringify({ nombre, sede, descriptors: [descriptorPromedio] })
  });

  const data = await response.json();
  mensaje.innerText = data.msg;
  mensaje.style.color = response.ok ? "lightgreen" : "red";

  // Actualizar canvas con el nombre de la persona registrada
  if (response.ok) dibujarRostro(nombre);
});
</script>

</body>
</html>
