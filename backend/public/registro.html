<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Registrar Persona — Control Biométrico</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
:root {
  --bg: #080c14;
  --surface: #0f1520;
  --surface2: #151d2e;
  --surface3: #1c2740;
  --border: rgba(0,200,180,0.12);
  --accent: #00c8b4;
  --accent-dim: rgba(0,200,180,0.12);
  --text: #e8edf5;
  --muted: #5a6a82;
  --danger: #ef4444;
  --success: #10b981;
  --font-mono: 'Space Mono', monospace;
  --font-body: 'DM Sans', sans-serif;
  --radius: 14px;
  --shadow: 0 8px 40px rgba(0,0,0,0.5);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-body);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  overflow-x: hidden;
}

body::before {
  content:'';
  position:fixed; inset:0;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
  pointer-events:none; z-index:0;
}

/* ===== NAVBAR ===== */
.navbar {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 0 28px;
  height: 64px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 100;
  backdrop-filter: blur(12px);
}

.brand {
  font-family: var(--font-mono);
  color: var(--accent);
  font-size: 0.95rem;
  letter-spacing: 2px;
  display: flex;
  align-items: center;
  gap: 10px;
  text-decoration: none;
}

.brand-dot {
  width: 8px; height: 8px;
  background: var(--accent);
  border-radius: 50%;
  box-shadow: 0 0 10px var(--accent);
  animation: pulse 2s ease-in-out infinite;
}

@keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.4;transform:scale(0.7)} }

.nav-links {
  list-style: none;
  display: flex;
  gap: 4px;
  align-items: center;
}

.nav-links a {
  color: var(--muted);
  text-decoration: none;
  font-size: 0.83rem;
  font-weight: 500;
  padding: 6px 14px;
  border-radius: 8px;
  transition: all 0.2s;
}

.nav-links a:hover { color: var(--text); background: var(--surface2); }
.nav-links .danger a { color: var(--danger); }
.nav-links .danger a:hover { background: rgba(239,68,68,0.1); }

.hamburger { display:none; flex-direction:column; gap:5px; cursor:pointer; padding:4px; }
.hamburger div { width:22px; height:2px; background: var(--muted); border-radius:2px; transition:0.3s; }

@media(max-width:680px){
  .hamburger { display:flex; }
  .nav-links {
    display:none; flex-direction:column; gap:0;
    position:absolute; top:64px; right:16px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 8px;
    min-width: 180px;
    box-shadow: var(--shadow);
  }
  .nav-links.show { display:flex; }
  .nav-links a { padding: 10px 14px; }
}

/* ===== MAIN ===== */
main {
  flex: 1;
  display: flex;
  align-items: flex-start;
  justify-content: center;
  padding: 40px 20px;
  position: relative;
  z-index: 1;
}

main::before {
  content:'';
  position:fixed;
  top:20%; left:50%;
  transform:translate(-50%,-50%);
  width:500px; height:500px;
  background: radial-gradient(circle, rgba(0,200,180,0.04) 0%, transparent 70%);
  pointer-events:none;
}

.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  width: 100%;
  max-width: 520px;
  box-shadow: var(--shadow);
  overflow: hidden;
  animation: fadeUp 0.5s ease both;
}

@keyframes fadeUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }

.card-header {
  padding: 24px 28px 20px;
  border-bottom: 1px solid var(--border);
}

.card-eyebrow {
  font-family: var(--font-mono);
  font-size: 0.68rem;
  letter-spacing: 3px;
  color: var(--accent);
  text-transform: uppercase;
  margin-bottom: 6px;
}

.card-title {
  font-family: var(--font-mono);
  font-size: 1.3rem;
  font-weight: 700;
  color: var(--text);
}

.card-body { padding: 24px 28px; }

/* ===== ACCESO DENEGADO ===== */
.denied {
  text-align: center;
  padding: 40px 28px;
}

.denied-icon { font-size: 2.5rem; margin-bottom: 12px; opacity: 0.5; }
.denied-title { font-family: var(--font-mono); font-size: 0.9rem; color: var(--danger); margin-bottom: 8px; }
.denied-sub { font-size: 0.83rem; color: var(--muted); }

/* ===== FORM ===== */
.field { margin-bottom: 16px; }

.field label {
  display: block;
  font-family: var(--font-mono);
  font-size: 0.68rem;
  letter-spacing: 2px;
  color: var(--muted);
  text-transform: uppercase;
  margin-bottom: 7px;
}

.field input,
.field select {
  width: 100%;
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--text);
  border-radius: 9px;
  padding: 11px 15px;
  font-size: 0.9rem;
  font-family: var(--font-body);
  outline: none;
  transition: border-color 0.2s, background 0.2s;
  appearance: none;
}

.field input:focus,
.field select:focus {
  border-color: var(--accent);
  background: var(--surface3);
}

.field input::placeholder { color: var(--muted); }
.field select option { background: var(--surface2); }

.select-wrap { position: relative; }
.select-wrap::after {
  content: '▾';
  position: absolute;
  right: 14px; top: 50%;
  transform: translateY(-50%);
  color: var(--muted);
  pointer-events: none;
  font-size: 0.8rem;
}

.btn-primary {
  width: 100%;
  background: var(--accent-dim);
  border: 1px solid var(--accent);
  color: var(--accent);
  padding: 12px;
  border-radius: 9px;
  font-family: var(--font-mono);
  font-size: 0.85rem;
  letter-spacing: 1px;
  cursor: pointer;
  transition: all 0.2s;
  margin-top: 4px;
}

.btn-primary:hover:not(:disabled) { background: var(--accent); color: #000; }
.btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }

/* ===== STATUS MSG ===== */
.status-bar {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 11px 15px;
  border-radius: 9px;
  background: var(--surface2);
  border: 1px solid var(--border);
  font-size: 0.82rem;
  color: var(--muted);
  margin-top: 16px;
  transition: all 0.3s;
  min-height: 44px;
}

.status-bar.success { border-color: rgba(16,185,129,0.4); color: #34d399; background: rgba(16,185,129,0.07); }
.status-bar.error   { border-color: rgba(239,68,68,0.4);  color: #f87171; background: rgba(239,68,68,0.07); }
.status-bar.loading { border-color: rgba(0,200,180,0.4);  color: var(--accent); background: var(--accent-dim); }

.status-dot-msg {
  width: 7px; height: 7px;
  border-radius: 50%;
  flex-shrink: 0;
  background: currentColor;
}

.status-bar.loading .status-dot-msg { animation: pulse 1s infinite; }

.divider { border: none; border-top: 1px solid var(--border); margin: 20px 0; }

/* ===== VIDEO AREA ===== */
.video-section { display: flex; flex-direction: column; align-items: center; gap: 0; }

.video-label {
  font-family: var(--font-mono);
  font-size: 0.68rem;
  letter-spacing: 2px;
  color: var(--muted);
  text-transform: uppercase;
  margin-bottom: 12px;
  align-self: flex-start;
}

.video-wrap {
  position: relative;
  border-radius: 12px;
  overflow: hidden;
  border: 1px solid var(--border);
  box-shadow: 0 0 30px rgba(0,200,180,0.06);
  width: 100%;
  max-width: 464px;
  aspect-ratio: 4/3;
  background: var(--surface2);
}

.video-wrap video,
.video-wrap canvas {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  border-radius: 12px;
  object-fit: cover;
}

.video-wrap::after {
  content: '';
  position: absolute;
  left: 0; right: 0;
  height: 2px;
  background: linear-gradient(90deg, transparent, var(--accent), transparent);
  top: 0;
  animation: scan 3s linear infinite;
  opacity: 0.5;
  z-index: 3;
  pointer-events: none;
}

@keyframes scan {
  0%   { top: 0%; opacity: 0; }
  5%   { opacity: 0.6; }
  95%  { opacity: 0.6; }
  100% { top: 100%; opacity: 0; }
}

.corner { position: absolute; width: 18px; height: 18px; z-index: 4; }
.corner-tl { top:10px; left:10px; border-top:2px solid var(--accent); border-left:2px solid var(--accent); }
.corner-tr { top:10px; right:10px; border-top:2px solid var(--accent); border-right:2px solid var(--accent); }
.corner-bl { bottom:10px; left:10px; border-bottom:2px solid var(--accent); border-left:2px solid var(--accent); }
.corner-br { bottom:10px; right:10px; border-bottom:2px solid var(--accent); border-right:2px solid var(--accent); }

/* ===== FOOTER ===== */
footer {
  background: var(--surface);
  border-top: 1px solid var(--border);
  padding: 18px;
  text-align: center;
  font-family: var(--font-mono);
  font-size: 0.72rem;
  color: var(--muted);
  position: relative;
  z-index: 1;
}

.footer-brand {
  color: var(--accent);
  letter-spacing: 3px;
  text-shadow: 0 0 10px rgba(0,200,180,0.5);
}
</style>
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar">
  <a class="brand" href="index.html">
    <div class="brand-dot"></div>
    CONTROL BIOMÉTRICO
  </a>
  <div class="hamburger" id="hamburger"><div></div><div></div><div></div></div>
  <ul class="nav-links" id="navLinks">
    <li id="linkLogin"><a href="login.html">Login</a></li>
    <li id="linkIndex" style="display:none"><a href="index.html">Inicio</a></li>
    <li id="linkPanel" style="display:none"><a href="admin.html">Panel Admin</a></li>
    <li id="linkUsuarios" style="display:none"><a href="usuarios.html">Usuarios</a></li>
    <li id="linkLogout" class="danger" style="display:none"><a href="#" id="logoutBtn">Cerrar sesión</a></li>
  </ul>
</nav>

<!-- MAIN -->
<main>
  <div class="card">
    <div class="card-header">
      <div class="card-eyebrow">Sistema Biométrico</div>
      <div class="card-title">Registrar Persona</div>
    </div>

    <div class="card-body" id="cardBody">

      <!-- FORM -->
      <div class="field">
        <label>Nombre completo</label>
        <input type="text" id="nombre" placeholder="Ej: Juan Pérez" autocomplete="off" />
      </div>

      <div class="field">
        <label>Sede</label>
        <div class="select-wrap">
          <select id="sede">
            <option value="">Seleccionar sede…</option>
            <option value="SOATA">SOATA</option>
            <option value="PAIPA">PAIPA</option>
          </select>
        </div>
      </div>

      <button class="btn-primary" id="btnRegistrar">Registrar Persona</button>

      <!-- STATUS -->
      <div class="status-bar loading" id="mensaje">
        <div class="status-dot-msg"></div>
        <span id="mensajeTexto">Cargando modelos…</span>
      </div>

      <hr class="divider">

      <!-- VIDEO -->
      <div class="video-section">
        <div class="video-label">Vista de cámara en vivo</div>
        <div class="video-wrap">
          <div class="corner corner-tl"></div>
          <div class="corner corner-tr"></div>
          <div class="corner corner-bl"></div>
          <div class="corner corner-br"></div>
          <video id="video" autoplay muted playsinline></video>
          <canvas id="canvas"></canvas>
        </div>
      </div>

    </div>
  </div>
</main>

<footer>
  Powered by <span class="footer-brand">HOPD</span> &nbsp;·&nbsp; © <span id="year"></span> Control Biométrico
</footer>

<script src="/js/face-api.min.js"></script>
<script>
document.getElementById("year").textContent = new Date().getFullYear();

/* ===== HELPERS ===== */
function showDenied(msg) {
  document.getElementById("cardBody").innerHTML = `
    <div class="denied">
      <div class="denied-icon">🔒</div>
      <div class="denied-title">Acceso restringido</div>
      <div class="denied-sub">${msg}</div>
    </div>`;
}

function setStatus(msg, type = "loading") {
  const bar = document.getElementById("mensaje");
  if (!bar) return;
  bar.className = `status-bar ${type}`;
  document.getElementById("mensajeTexto").textContent = msg;
}

/* ===== AUTH + NAVBAR ===== */
const token = localStorage.getItem("token");

document.getElementById("hamburger").addEventListener("click", () =>
  document.getElementById("navLinks").classList.toggle("show")
);

document.getElementById("logoutBtn").addEventListener("click", e => {
  e.preventDefault();
  localStorage.removeItem("token");
  window.location.href = "login.html";
});

let role = null;

if (!token) {
  showDenied("Debes iniciar sesión para acceder.");
} else {
  try {
    const payload = JSON.parse(atob(token.split('.')[1]));
    role = payload.role;

    if (role !== "admin" && role !== "user") throw new Error();

    document.getElementById("linkLogin").style.display   = "none";
    document.getElementById("linkLogout").style.display  = "block";
    document.getElementById("linkIndex").style.display   = "block";

    if (role === "admin") {
      document.getElementById("linkPanel").style.display    = "block";
      document.getElementById("linkUsuarios").style.display = "block";
    }

    /* ===== INIT FACE API (solo si hay sesión) ===== */
    window.addEventListener("load", async () => {
      await cargarModelos();
      await activarCamara();
      dibujarRostro();
    });

  } catch {
    localStorage.removeItem("token");
    showDenied("Sesión inválida. Por favor inicia sesión de nuevo.");
  }
}

/* ===== VIDEO & FACE API ===== */
const video  = document.getElementById("video");
const canvas = document.getElementById("canvas");
const ctx    = canvas ? canvas.getContext("2d") : null;

async function cargarModelos() {
  setStatus("Cargando modelos de reconocimiento…", "loading");
  await faceapi.nets.tinyFaceDetector.loadFromUri("/models");
  await faceapi.nets.faceLandmark68Net.loadFromUri("/models");
  await faceapi.nets.faceRecognitionNet.loadFromUri("/models");
  setStatus("Modelos cargados ✓", "success");
}

async function activarCamara() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
    video.srcObject = stream;
    await video.play();
    setStatus("Cámara activa. Listo para registrar.", "success");
  } catch {
    setStatus("No se pudo acceder a la cámara.", "error");
  }
}

async function capturarDescriptor() {
  const descriptors = [];
  for (let i = 0; i < 3; i++) {
    const det = await faceapi
      .detectSingleFace(video, new faceapi.TinyFaceDetectorOptions({ inputSize: 320, scoreThreshold: 0.5 }))
      .withFaceLandmarks().withFaceDescriptor();
    if (!det) { setStatus("No se detecta rostro. Acércate a la cámara.", "error"); return null; }
    descriptors.push(Array.from(det.descriptor));
    await new Promise(r => setTimeout(r, 500));
  }
  return descriptors[0].map((_, i) => descriptors.reduce((s, d) => s + d[i], 0) / descriptors.length);
}

function dibujarRostro() {
  if (!canvas || !ctx) return;
  canvas.width  = video.videoWidth  || 640;
  canvas.height = video.videoHeight || 480;
  const displaySize = { width: canvas.width, height: canvas.height };
  faceapi.matchDimensions(canvas, displaySize);

  setInterval(async () => {
    const det = await faceapi
      .detectSingleFace(video, new faceapi.TinyFaceDetectorOptions({ inputSize: 320, scoreThreshold: 0.5 }))
      .withFaceLandmarks();
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    if (det) {
      const r = faceapi.resizeResults(det, displaySize);
      const b = r.detection.box;
      ctx.strokeStyle = "#00c8b4";
      ctx.lineWidth   = 2;
      ctx.shadowColor = "#00c8b4";
      ctx.shadowBlur  = 12;
      ctx.strokeRect(b.x, b.y, b.width, b.height);
      ctx.shadowBlur = 0;
      ctx.font = "13px 'Space Mono', monospace";
      ctx.fillStyle = "#00c8b4";
      ctx.textAlign = "center";
      ctx.fillText("DETECTADO", b.x + b.width / 2, b.y - 8);
    }
  }, 200);
}

/* ===== REGISTRAR ===== */
document.getElementById("btnRegistrar")?.addEventListener("click", async () => {
  const nombre = document.getElementById("nombre").value.trim();
  const sede   = document.getElementById("sede").value;

  if (!nombre || !sede) {
    setStatus("Completa nombre y sede antes de continuar.", "error");
    return;
  }

  const btn = document.getElementById("btnRegistrar");
  btn.disabled = true;
  setStatus("Capturando rostro… mantente quieto.", "loading");

  const descriptor = await capturarDescriptor();
  if (!descriptor) { btn.disabled = false; return; }

  setStatus("Enviando datos al servidor…", "loading");

  try {
    const res  = await fetch("/registrar-persona", {
      method: "POST",
      headers: { "Content-Type": "application/json", Authorization: `Bearer ${token}` },
      body: JSON.stringify({ nombre, sede, descriptors: [descriptor] })
    });
    const data = await res.json();
    setStatus(data.msg, res.ok ? "success" : "error");
  } catch {
    setStatus("Error de conexión con el servidor.", "error");
  }

  btn.disabled = false;
});
</script>
</body>
</html>
