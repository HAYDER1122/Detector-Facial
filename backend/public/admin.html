<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Panel Administrativo</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
  background-color: #0b0f17;
  color: white;
}

/* Navbar personalizada */
.navbar-custom {
  background-color: #111827;
}

.navbar-custom .navbar-brand {
  color: #00ffcc;
  font-weight: bold;
}

.navbar-custom .nav-link {
  color: white;
}

.navbar-custom .nav-link:hover {
  color: #00ffcc;
}
</style>

<script>
// 🔐 Proteger acceso
if (!localStorage.getItem("token")) {
  window.location.href = "login.html";
}
</script>

</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-custom mb-4">
  <div class="container-fluid">
    <a class="navbar-brand" href="index.html">Control Biométrico</a>

    <button class="navbar-toggler bg-light" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item">
          <a class="nav-link" href="index.html">Inicio</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="registro.html">Registrar Usuario</a>
        </li>
        <li class="nav-item">
          <a class="nav-link text-danger" href="#" id="logoutBtn">Cerrar sesión</a>
        </li>
      </ul>
    </div>
  </div>
</nav>

<div class="container">

<h2 class="mb-4">Panel Administrativo</h2>

<!-- Exportar Excel -->
<button id="exportExcel" class="btn btn-success mb-3">
  Exportar Registros a Excel
</button>

<!-- Filtro -->
<div class="mb-3">
  <input type="date" id="fechaFiltro" class="form-control" />
</div>

<!-- Tabla registros -->
<h4>Registros de Asistencia</h4>
<input type="text" id="busquedaNombre" placeholder="Buscar por nombre" class="form-control mb-2" />

<div class="table-responsive">
<table class="table table-striped table-dark">
  <thead>
    <tr>
      <th>Nombre</th>
      <th>Sede</th>
      <th>Tipo</th>
      <th>Fecha</th>
    </tr>
  </thead>
  <tbody id="registrosBody"></tbody>
</table>
</div>

<!-- Gráfico -->
<h4 class="mt-5">Gráfico Entradas/Salidas</h4>
<canvas id="graficoAsistencias" height="100"></canvas>

<!-- Tabla personas -->
<h4 class="mt-5">Personas Registradas</h4>
<div class="table-responsive">
<table class="table table-bordered table-dark">
  <thead>
    <tr>
      <th>Nombre</th>
      <th>Sede</th>
      <th>Activo</th>
      <th>Acción</th>
    </tr>
  </thead>
  <tbody id="personasBody"></tbody>
</table>
</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="admin.js"></script>

<script>
// 🚪 Logout
document.getElementById("logoutBtn").addEventListener("click", function(e) {
  e.preventDefault();
  localStorage.removeItem("token");
  window.location.href = "login.html";
});
</script>
<script>
document.addEventListener("DOMContentLoaded", () => {
  const token = localStorage.getItem("token");

  const linkLogin = document.getElementById("linkLogin");
  const linkPanel = document.getElementById("linkPanel");
  const linkRegistro = document.getElementById("linkRegistro");
  const linkLogout = document.getElementById("linkLogout");
  const logoutBtn = document.getElementById("logoutBtn");

  // Mostrar / ocultar menú según sesión
  if (token) {
    linkLogin.style.display = "none";
    linkPanel.style.display = "block";
    linkRegistro.style.display = "block";
    linkLogout.style.display = "block";
  } else {
    linkLogin.style.display = "block";
    linkPanel.style.display = "none";
    linkRegistro.style.display = "none";
    linkLogout.style.display = "none";
  }

  // Logout manual
  if (logoutBtn) {
    logoutBtn.addEventListener("click", (e) => {
      e.preventDefault();
      localStorage.removeItem("token");
      window.location.href = "login.html";
    });
  }

  // Hamburguesa
  const hamburger = document.getElementById("hamburger");
  const navLinks = document.getElementById("navLinks");
  hamburger.addEventListener("click", () => navLinks.classList.toggle("show"));
});

// Eliminar token solo al **cerrar la pestaña**, no al recargar
window.addEventListener("unload", () => {
  if (!document.hidden) { // Se dispara al cerrar la pestaña
    localStorage.removeItem("token");
  }
});
</script>


</body>
</html>
