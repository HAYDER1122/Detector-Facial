<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Panel Administrativo</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body { background-color: #0b0f17; color: white; font-family: Arial, sans-serif; }
.navbar-custom { background-color: #111827; }
.navbar-custom .navbar-brand { color: #00ffcc; font-weight: bold; }
.navbar-custom .nav-link { color: white; }
.navbar-custom .nav-link:hover { color: #00ffcc; }
.table-dark th, .table-dark td { vertical-align: middle; }
.entrada { background-color: rgba(13,110,253,0.2); }
.salida { background-color: rgba(220,53,69,0.2); }
.descanso_salida { background-color: rgba(255,193,7,0.2); }
.descanso_entrada { background-color: rgba(25,135,84,0.2); }

body { min-height: 100vh; display: flex; flex-direction: column; }
#panel { flex: 1; }
.footer-custom { background: #111827; padding: 25px 0; border-top: 1px solid rgba(255,255,255,0.08); margin-top: auto; }
.footer-content { text-align: center; font-size: 0.9em; color: #aaa; }
.brand-footer { color: #00ffcc; font-weight: bold; letter-spacing: 2px; animation: glowFooter 2s ease-in-out infinite alternate; }
@keyframes glowFooter { from { text-shadow: 0 0 5px #00ffcc; } to { text-shadow: 0 0 15px #00ffcc; } }

.table-container { max-height: 400px; overflow-y: auto; }
.table-container thead { position: sticky; top: 0; background-color: #111827; z-index: 1; }
</style>

<script>
if (!localStorage.getItem("token")) window.location.href = "login.html";
</script>
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-custom mb-4">
  <div class="container-fluid">
    <a class="navbar-brand" href="index.html">Control Biométrico</a>
    <ul class="navbar-nav ms-auto">
      <li class="nav-item"><a class="nav-link" href="index.html">Inicio</a></li>
      <li class="nav-item"><a class="nav-link" href="registro.html">Registrar Personas</a></li>
      <li id="linkUsuarios" style="display:none;"><a href="usuarios.html">Registrar Usuarios</a></li>
      <li class="nav-item"><a class="nav-link text-danger" href="#" id="logoutBtn">Cerrar sesión</a></li>
    </ul>
  </div>
</nav>

<div class="container" id="panel">

<h2 class="mb-4">Panel Administrativo</h2>

<button id="exportExcel" class="btn btn-success mb-3">Exportar Registros a Excel</button>

<div class="mb-3">
  <input type="date" id="fechaFiltro" class="form-control mb-2" />
  <input type="text" id="busquedaGeneral" placeholder="Buscar por nombre o sede" class="form-control" />
</div>

<h4>Registros de Asistencia</h4>
<div class="table-container mb-4">
  <table class="table table-striped table-dark">
    <thead>
      <tr>
        <th>Nombre</th>
        <th>Sede</th>
        <th>Tipo</th>
        <th>Fecha</th>
      </tr>
    </thead>
    <tbody id="registrosBody"></tbody>
  </table>
</div>

<h4 class="mt-3">Gráfico Entradas/Salidas</h4>
<canvas id="graficoAsistencias" height="100"></canvas>

<h4 class="mt-5">Personas Registradas</h4>
<div class="table-container">
  <table class="table table-bordered table-dark">
    <thead>
      <tr>
        <th>Nombre</th>
        <th>Sede</th>
        <th>Activo</th>
        <th>Acciones</th>
      </tr>
    </thead>
    <tbody id="personasBody"></tbody>
  </table>
</div>

</div>

<script>
const token = localStorage.getItem("token");
const registrosBody = document.getElementById("registrosBody");
const personasBody = document.getElementById("personasBody");
const fechaFiltro = document.getElementById("fechaFiltro");
const busquedaGeneral = document.getElementById("busquedaGeneral");
const exportBtn = document.getElementById("exportExcel");
let chart;

/* ================= LOGOUT ================= */

document.getElementById("logoutBtn").addEventListener("click", e => {
  e.preventDefault();
  localStorage.removeItem("token");
  window.location.href="login.html";
});

/* ================= DEBOUNCE ================= */

function debounce(fn, delay){
  let timer;
  return (...args)=>{
    clearTimeout(timer);
    timer=setTimeout(()=>fn.apply(this,args),delay);
  };
}

/* ================= REGISTROS ================= */

async function cargarRegistros(){
  const params = new URLSearchParams();
  if(fechaFiltro.value) params.append("fecha",fechaFiltro.value);
  if(busquedaGeneral.value) params.append("busqueda",busquedaGeneral.value);

  const res = await fetch("/asistencias?"+params.toString(),{
    headers:{Authorization:`Bearer ${token}`}
  });

  const data = await res.json();
  registrosBody.innerHTML="";

  if(!data.length){
    registrosBody.innerHTML="<tr><td colspan='4'>Sin registros</td></tr>";
  }

  data.forEach(r=>{
    const tr=document.createElement("tr");
    tr.className=r.tipo;
    tr.innerHTML=`
      <td>${r.nombre}</td>
      <td>${r.sede}</td>
      <td>${r.tipo}</td>
      <td>${new Date(r.fecha).toLocaleString()}</td>
    `;
    registrosBody.appendChild(tr);
  });

  actualizarGrafico(data);
}

/* ================= GRAFICO ================= */

function actualizarGrafico(data){
  const ctx=document.getElementById("graficoAsistencias").getContext("2d");
  const tipos=["entrada","salida","descanso_salida","descanso_entrada"];
  const counts=tipos.map(t=>data.filter(r=>r.tipo===t).length);

  if(chart) chart.destroy();

  chart=new Chart(ctx,{
    type:"bar",
    data:{
      labels:["Entrada","Salida","Descanso Salida","Descanso Entrada"],
      datasets:[{
        data:counts,
        backgroundColor:["#0d6efd","#dc3545","#ffc107","#198754"]
      }]
    },
    options:{plugins:{legend:{display:false}}}
  });
}

/* ================= EXPORTAR EXCEL ================= */

exportBtn.addEventListener("click",async()=>{
  const params=new URLSearchParams();
  if(fechaFiltro.value) params.append("fecha",fechaFiltro.value);
  if(busquedaGeneral.value) params.append("busqueda",busquedaGeneral.value);

  const res=await fetch("/exportar-registros?"+params.toString(),{
    headers:{Authorization:`Bearer ${token}`}
  });

  if(!res.ok){
    alert("Error al exportar");
    return;
  }

  const blob=await res.blob();
  const url=window.URL.createObjectURL(blob);
  const a=document.createElement("a");
  a.href=url;
  a.download="registros.xlsx";
  document.body.appendChild(a);
  a.click();
  a.remove();
  window.URL.revokeObjectURL(url);
});

/* ================= PERSONAS ADMIN ================= */

async function cargarPersonas(){
  const res=await fetch("/personas",{headers:{Authorization:`Bearer ${token}`}});
  const personas=await res.json();
  personasBody.innerHTML="";

  personas.forEach(p=>{
    const tr=document.createElement("tr");
    tr.innerHTML=`
      <td>${p.nombre}</td>
      <td>${p.sede}</td>
      <td>${p.activo?"Sí":"No"}</td>
      <td>
        <button class="btn btn-sm btn-warning editBtn">Editar</button>
        <button class="btn btn-sm btn-danger deleteBtn">Eliminar</button>
        <button class="btn btn-sm btn-primary toggleBtn">Toggle</button>
      </td>
    `;

    tr.querySelector(".editBtn").onclick=async()=>{
      const nombre=prompt("Editar nombre:",p.nombre);
      if(nombre===null) return;
      const sede=prompt("Editar sede:",p.sede);
      if(sede===null) return;

      await fetch(`/personas/${p.id}`,{
        method:"PUT",
        headers:{
          "Content-Type":"application/json",
          Authorization:`Bearer ${token}`
        },
        body:JSON.stringify({nombre,sede})
      });

      cargarPersonas();
    };

    tr.querySelector(".deleteBtn").onclick=async()=>{
      if(!confirm("¿Eliminar persona?")) return;
      await fetch(`/personas/${p.id}`,{
        method:"DELETE",
        headers:{Authorization:`Bearer ${token}`}
      });
      cargarPersonas();
    };

    tr.querySelector(".toggleBtn").onclick=async()=>{
      await fetch(`/personas/${p.id}/toggle`,{
        method:"POST",
        headers:{Authorization:`Bearer ${token}`}
      });
      cargarPersonas();
    };

    personasBody.appendChild(tr);
  });
}

/* ================= EVENTOS ================= */

fechaFiltro.addEventListener("input",cargarRegistros);
busquedaGeneral.addEventListener("input",debounce(cargarRegistros,300));

window.addEventListener("load",()=>{
  cargarRegistros();
  cargarPersonas();
});
</script>

<footer class="footer-custom">
  <div class="footer-content">
    Powered by <span class="brand-footer">HOPD</span><br>
    © <span id="year"></span> Control Biométrico
  </div>
</footer>

<script>
document.getElementById("year").textContent=new Date().getFullYear();
</script>

</body>
</html>
