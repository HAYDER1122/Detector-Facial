<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Panel Administrativo Avanzado</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
body { background-color: #0b0f17; color: white; }
.navbar-custom { background-color: #111827; }
.navbar-custom .navbar-brand { color: #00ffcc; font-weight: bold; }
.navbar-custom .nav-link { color: white; }
.navbar-custom .nav-link:hover { color: #00ffcc; }
.table-dark th, .table-dark td { vertical-align: middle; }
.entrada { background-color: rgba(13,110,253,0.2); }
.salida { background-color: rgba(220,53,69,0.2); }
.descanso_salida { background-color: rgba(255,193,7,0.2); }
.descanso_entrada { background-color: rgba(25,135,84,0.2); }
</style>
<script>
// 🔐 Redirigir si no hay token
if (!localStorage.getItem("token")) window.location.href = "login.html";
</script>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-custom mb-4">
  <div class="container-fluid">
    <a class="navbar-brand" href="index.html">Control Biométrico</a>
    <button class="navbar-toggler bg-light" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link" href="index.html">Inicio</a></li>
        <li class="nav-item"><a class="nav-link" href="registro.html">Registrar Usuario</a></li>
        <li class="nav-item"><a class="nav-link text-danger" href="#" id="logoutBtn">Cerrar sesión</a></li>
      </ul>
    </div>
  </div>
</nav>

<div class="container">
<h2 class="mb-4">Panel Administrativo Avanzado</h2>

<button id="exportExcel" class="btn btn-success mb-3">Exportar Registros a Excel</button>

<div class="mb-3">
  <input type="date" id="fechaFiltro" class="form-control mb-2" />
  <input type="text" id="busquedaGeneral" placeholder="Buscar por nombre, sede o tipo" class="form-control" />
</div>

<h4>Registros de Asistencia</h4>
<div class="table-responsive">
<table class="table table-striped table-dark">
  <thead>
    <tr>
      <th>Nombre</th>
      <th>Sede</th>
      <th>Tipo</th>
      <th>Fecha</th>
    </tr>
  </thead>
  <tbody id="registrosBody"></tbody>
</table>
</div>

<h4 class="mt-5">Gráfico Entradas/Salidas</h4>
<canvas id="graficoAsistencias" height="100"></canvas>

<h4 class="mt-5">Personas Registradas</h4>
<div class="table-responsive">
<table class="table table-bordered table-dark">
  <thead>
    <tr>
      <th>Nombre</th>
      <th>Sede</th>
      <th>Activo</th>
      <th>Acción</th>
    </tr>
  </thead>
  <tbody id="personasBody"></tbody>
</table>
</div>
</div>

<script>
const token = localStorage.getItem("token");
const fechaFiltro = document.getElementById("fechaFiltro");
const busquedaGeneral = document.getElementById("busquedaGeneral");
const registrosBody = document.getElementById("registrosBody");
const personasBody = document.getElementById("personasBody");
const exportBtn = document.getElementById("exportExcel");
let chart;

// ---------------- LOGOUT ----------------
document.getElementById("logoutBtn").addEventListener("click", e => {
  e.preventDefault();
  localStorage.removeItem("token");
  window.location.href="login.html";
});

// ---------------- DEBOUNCE ----------------
function debounce(fn, delay) {
  let timer;
  return function(...args){
    clearTimeout(timer);
    timer = setTimeout(()=> fn.apply(this,args), delay);
  };
}

// ---------------- CARGAR PERSONAS ----------------
async function cargarPersonas() {
  try {
    const res = await fetch("/personas", { headers:{ "Authorization": `Bearer ${token}` } });
    const personas = await res.json();
    personasBody.innerHTML = "";
    personas.forEach(p => {
      const tr = document.createElement("tr");
      tr.innerHTML = `
        <td>${p.nombre}</td>
        <td>${p.sede}</td>
        <td>${p.activo ? "Sí" : "No"}</td>
        <td><button class="btn btn-sm btn-primary toggleBtn">Toggle</button></td>
      `;
      tr.querySelector(".toggleBtn").addEventListener("click", async () => {
        await fetch(`/personas/${p.id}/toggle`, {
          method:"POST",
          headers:{ "Authorization": `Bearer ${token}` }
        });
        cargarPersonas();
      });
      personasBody.appendChild(tr);
    });
  } catch(e){ console.error("Error cargando personas:", e); }
}

// ---------------- CARGAR REGISTROS ----------------
async function cargarRegistros() {
  try {
    const fecha = fechaFiltro.value;
    const busqueda = busquedaGeneral.value.trim().toLowerCase();
    const params = new URLSearchParams();
    if(fecha) params.append("fecha", fecha);
    if(busqueda){
      params.append("nombre", busqueda);
      params.append("sede", busqueda);
      params.append("tipo", busqueda); // 🔹 importante para filtrar tipo en backend
    }

    const res = await fetch("/asistencias?" + params.toString(), {
      headers:{ "Authorization": `Bearer ${token}` }
    });
    const registros = await res.json();

    registrosBody.innerHTML = "";
    registros.forEach(r => {
      const tr = document.createElement("tr");
      tr.className = r.tipo;
      tr.innerHTML = `
        <td>${r.nombre}</td>
        <td>${r.sede}</td>
        <td>${r.tipo}</td>
        <td>${new Date(r.fecha).toLocaleString()}</td>
      `;
      registrosBody.appendChild(tr);
    });

    actualizarGrafico(registros);

  } catch(e){ console.error("Error cargando registros:", e); }
}

// ---------------- ACTUALIZAR GRÁFICO ----------------
function actualizarGrafico(data){
  const ctx = document.getElementById("graficoAsistencias").getContext("2d");
  const tipos = ["entrada","salida","descanso_salida","descanso_entrada"];
  const counts = tipos.map(t => data.filter(r => r.tipo===t).length);

  if(chart) chart.destroy();
  chart = new Chart(ctx, {
    type:"bar",
    data:{
      labels:["Entrada","Salida","Descanso Salida","Descanso Entrada"],
      datasets:[{
        label:"Cantidad",
        data:counts,
        backgroundColor:["#0d6efd","#dc3545","#ffc107","#198754"]
      }]
    },
    options:{ responsive:true, plugins:{ legend:{ display:false } } }
  });
}

// ---------------- EXPORTAR EXCEL ----------------
exportBtn.addEventListener("click", async () => {
  const fecha = fechaFiltro.value;
  const busqueda = busquedaGeneral.value.trim().toLowerCase();
  const params = new URLSearchParams();
  if(fecha) params.append("fecha", fecha);
  if(busqueda){
    params.append("nombre", busqueda);
    params.append("sede", busqueda);
    params.append("tipo", busqueda);
  }

  const res = await fetch("/exportar-registros?" + params.toString(), {
    headers:{ "Authorization": `Bearer ${token}` }
  });

  if(!res.ok){
    const data = await res.json();
    alert(data.msg || "Error al exportar");
    return;
  }

  const blob = await res.blob();
  const url = window.URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = "registros.xlsx";
  document.body.appendChild(a);
  a.click();
  a.remove();
  window.URL.revokeObjectURL(url);
});

// ---------------- EVENTOS FILTROS ----------------
fechaFiltro.addEventListener("input", cargarRegistros);
busquedaGeneral.addEventListener("input", debounce(cargarRegistros, 300));

// ---------------- INICIALIZAR ----------------
window.addEventListener("load", () => {
  cargarPersonas();
  cargarRegistros();
});
</script>
</body>
</html>
